version: v2
modules:
  - path: .
    name: buf.build/reh3376/forge
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_DIRECTORY_MATCH
    # ContextualRecord is intentionally reused across Ingest/Collect/Subscribe/Backfill RPCs
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - RPC_REQUEST_RESPONSE_UNIQUE
breaking:
  use:
    - FILE
